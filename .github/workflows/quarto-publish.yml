on:
  push:
    branches: main

name: Quarto Render & Publish to Pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Instalamos el compilador por si tu documento necesita ejecutar C durante el render
      - name: Setup C/C++ Compiler
        run: sudo apt-get install -y gcc g++

          # Despliegue directo a GitHub Pages
      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: web/templates.qmd  # <--- ESTA ES LA LÍNEA NUEVA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
